<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daizylz</title>

    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .card {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #ff007f;
            box-shadow: 0 0 25px #ff007f;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            width: 100%;
            max-width: 600px;
        }

        .title {
            font-size: 40px;
            color: white;
            font-weight: bold;
            margin-bottom: 10px;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px #ff007f;
            }

            to {
                text-shadow: 0 0 25px #ff33aa;
            }
        }

        .subtitle {
            color: white;
            margin-bottom: 20px;
            font-size: 15px;
        }

        .links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .links a {
            text-decoration: none;
            background: #ff007f;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 0 10px #ff007f;
        }

        .links a:hover {
            background: #ff3399;
            transform: scale(1.05);
            box-shadow: 0 0 20px #ff33aa;
        }

        .music-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ff007f;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            color: white;
            z-index: 1000;
            box-shadow: 0 0 20px #ff007f;
        }

        .music-popup button {
            background: #ff007f;
            color: white;
            border: none;
            padding: 10px 18px;
            margin: 5px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .music-popup button:hover {
            background: #ff3399;
        }

        #scplayer {
            display: none;
            width: 100%;
            height: 120px;
            border: none;
            border-radius: 10px;
            margin-top: 15px;
        }

        @media (max-width: 600px) {
            .title {
                font-size: 30px;
            }

            .subtitle {
                font-size: 13px;
            }

            .links a {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <canvas id="sky"></canvas>

    <div class="container">
        <div class="card">

            <div class="title">✨ Daizylz ✨</div>

            <div class="subtitle">
                Trần Tiến Dũng • Coder Website • My Profiles
            </div>

            <div class="links">
                <a href="https://www.tiktok.com/@_tieen.dxg" target="_blank">
                    TikTok
                </a>

                <a href="https://zalo.me/0394778781" target="_blank">
                    Zalo
                </a>

                <a href="https://www.instagram.com/ig_tdung208/" target="_blank">
                    Instagram
                </a>

                <a href="https://facebook.com/daizylz.py" target="_blank">
                    Facebook
                </a>
            </div>

            <iframe id="scplayer" allow="autoplay"></iframe>

        </div>
    </div>

    <div class="music-popup" id="musicPopup">
        <p>Playing Music?</p>

        <button onclick="playRandomSong()">
            Yes
        </button>

        <button onclick="closePopup()">
            No
        </button>
    </div>

    <script>

        const songs = [
            "https://soundcloud.com/ggehe-eheheg/ne-u-ta-ngu-o-c-lo-i-remix",
            "https://soundcloud.com/lun-nhok-779153574/m-c-v-n-quy-k-remix-full",
            "https://soundcloud.com/v-ho-ng-418813355/ch-ng-h-p-nhau-u-remix-vuz?si",
            "https://soundcloud.com/tr-n-v-n-i-707758371/co-ay-mat-uot-le-nhoa-houselak",
            "https://soundcloud.com/i-v-n-28451425/ch-ng-ai-hi-u-v-t-nh-y-u"
        ];

        function playRandomSong() {

            const randomIndex = Math.floor(Math.random() * songs.length);

            const iframe = document.getElementById('scplayer');

            iframe.style.display = 'block';

            iframe.src =
                `https://w.soundcloud.com/player/?url=${encodeURIComponent(songs[randomIndex])}&color=%23ff007f&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false`;

            document.getElementById('musicPopup').style.display = 'none';
        }

        function closePopup() {
            document.getElementById('musicPopup').style.display = 'none';
        }

        // background effect
        const canvas = document.getElementById('sky');
        const ctx = canvas.getContext('2d');

        let w, h;
        let stars = [];
        let meteors = [];

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }

        resize();

        window.addEventListener('resize', resize);

        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        for (let i = 0; i < 150; i++) {

            stars.push({
                x: Math.random() * w,
                y: Math.random() * h,
                radius: Math.random() * 1.5,
                alpha: random(0.3, 1),
                alphaChange: random(0.002, 0.005)
            });

        }

        function createMeteor() {

            meteors.push({
                x: Math.random() * w,
                y: Math.random() * h,
                length: random(50, 120),
                speed: random(5, 8),
                opacity: 1
            });

        }

        setInterval(createMeteor, 800);

        function draw() {

            ctx.clearRect(0, 0, w, h);

            ctx.fillStyle = "white";

            stars.forEach(star => {

                ctx.globalAlpha = star.alpha;

                ctx.beginPath();

                ctx.arc(
                    star.x,
                    star.y,
                    star.radius,
                    0,
                    Math.PI * 2
                );

                ctx.fill();

                star.alpha += star.alphaChange;

                if (star.alpha <= 0.3 || star.alpha >= 1) {
                    star.alphaChange *= -1;
                }

            });

            meteors.forEach((meteor, index) => {

                const gradient = ctx.createLinearGradient(
                    meteor.x,
                    meteor.y,
                    meteor.x - meteor.length,
                    meteor.y + meteor.length
                );

                gradient.addColorStop(
                    0,
                    `rgba(255,255,255,${meteor.opacity})`
                );

                gradient.addColorStop(1, 'transparent');

                ctx.strokeStyle = gradient;

                ctx.lineWidth = 2;

                ctx.beginPath();

                ctx.moveTo(meteor.x, meteor.y);

                ctx.lineTo(
                    meteor.x - meteor.length,
                    meteor.y + meteor.length
                );

                ctx.stroke();

                meteor.x += meteor.speed;
                meteor.y -= meteor.speed;
                meteor.opacity -= 0.02;

                if (meteor.opacity <= 0) {
                    meteors.splice(index, 1);
                }

            });

            requestAnimationFrame(draw);
        }

        draw();

    </script>

</body>

</html>
